<!doctype html>
<html lang="en" class="h-full w-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="🏃 Endless Runner game where the player has to dodge obstacles and keep moving forward."
    />
    <link rel="stylesheet" href="/src/style.css" />

    <!--
      manifest.webmanifest provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Endless Runner | remarkablegames</title>
  </head>
  <body class="h-full w-full select-none">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div
      id="spinner"
      class="fixed top-1/2 left-1/2 z-3 h-24 w-24 -translate-x-1/2 -translate-y-1/2 rounded-full border-4 border-[rgb(242_247_251_/_0.18)] border-t-[#49d7d0] animate-spin"
      role="progressbar"
      aria-label="Loading"
    ></div>
    <canvas id="game" class="h-full w-full outline-none"></canvas>
    <script type="module" src="/src/main.ts"></script>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script>
      window['ga-disable-%VITE_GOOGLE_ANALYTICS_ID%'] = %DEV%;
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () {
        dataLayer.push(arguments);
      };
      gtag('js', new Date());
      gtag('config', '%VITE_GOOGLE_ANALYTICS_ID%');
    </script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=%VITE_GOOGLE_ANALYTICS_ID%"
    ></script>
  </body>
</html>
